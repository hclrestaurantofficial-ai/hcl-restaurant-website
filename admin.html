<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - HCL Restaurant</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: linear-gradient(135deg,#141E30,#243B55); font-family:Arial; color:white; padding:50px; }
    input, button, select { padding:10px; margin:5px; border-radius:5px; border:none; }
    button { background:#ff9800; color:white; cursor:pointer; }
    button:hover { background:#e68900; }
    table { width:100%; margin-top:20px; border-collapse: collapse; color:white; }
    th, td { border:1px solid white; padding:8px; text-align:left; }
    th { background: rgba(255,255,255,0.2); }
    tr:nth-child(even) { background: rgba(255,255,255,0.1); }
    .hidden { display:none; }
  </style>
</head>
<body>

<h2>Admin Login</h2>
<input type="email" id="adminEmail" placeholder="Email"><br>
<input type="password" id="adminPass" placeholder="Password"><br>
<button onclick="login()">Login</button>

<div id="dashboard" class="hidden">
  <h2>Update User Status</h2>
  <input type="email" id="userEmail" placeholder="User Email">
  <select id="status">
    <option>CV Received</option>
    <option>Pending Approval</option>
    <option>Manager Review</option>
    <option>Interview</option>
    <option>Test</option>
    <option>Offer Letter</option>
    <option>Visa Processing</option>
  </select>
  <button onclick="updateStatus()">Update Status</button>

  <h2>All Applications</h2>
  <table>
    <thead><tr><th>Email</th><th>DOB</th><th>Status</th></tr></thead>
    <tbody id="userTable"></tbody>
  </table>
</div>

<script>
const { createClient } = supabase;
const supabaseClient = createClient(
  "https://vcaqgvcdttzzkkpziyiw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZjYXFndmNkdHR6emtrcHppeWl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MTI4MzcsImV4cCI6MjA4ODA4ODgzN30.zKZPeTk62F7a54-_HMxyMY37krrMS6bFadjoyGW8zLM"
);

const adminEmailAuth="shami786@gmail.com";
const adminPassAuth="Aht786190";

function login(){
  const email=document.getElementById("adminEmail").value.trim();
  const pass=document.getElementById("adminPass").value.trim();
  if(email===adminEmailAuth && pass===adminPassAuth){
    document.getElementById("dashboard").classList.remove("hidden");
    loadUsers();
  } else alert("Invalid Admin Credentials");
}

async function loadUsers(){
  const { data } = await supabaseClient.from("applications").select("*").order('created_at',{ascending:true});
  const tbody=document.getElementById("userTable");
  tbody.innerHTML="";
  data.forEach(user=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${user.email}</td><td>${new Date(user.dob).toISOString().split("T")[0]}</td><td>${user.status}</td>`;
    tbody.appendChild(tr);
  });
}

async function updateStatus(){
  const userEmail=document.getElementById("userEmail").value.trim().toLowerCase();
  const newStatus=document.getElementById("status").value;
  const { error } = await supabaseClient.from("applications").update({status:newStatus}).eq("email",userEmail);
  if(!error){ alert("Status Updated Successfully!"); loadUsers(); }
  else alert("Error updating status");
}
</script>

</body>
</html>
