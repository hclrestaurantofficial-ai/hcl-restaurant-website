<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracking - HCL Restaurant</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#ff3d3d;
color:white;
padding:15px;
text-align:center;
}

.tracking-box{
width:90%;
max-width:500px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:90%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
margin-top:15px;
padding:10px 20px;
background:#ff3d3d;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

.result{
display:none;
margin-top:20px;
background:#ffeaea;
padding:15px;
border-radius:8px;
}

</style>
</head>

<body>

<header>
<h2>HCL Restaurant Tracking</h2>
</header>

<div class="tracking-box">

<h3>Check Your Booking</h3>

<input type="email" id="email" placeholder="Enter your email">

<br>

<button onclick="track()">Track Now</button>

<div class="result" id="result">

<p><b>Name:</b> <span id="name"></span></p>

<p><b>Email:</b> <span id="showEmail"></span></p>

<p><b>Tracking Application:</b> <span id="application"></span></p>

<p><b>Booking Label:</b> <span id="label"></span></p>

<p><b>Status:</b> <span id="status"></span></p>

<p><b>Last Update:</b> <span id="update"></span></p>

</div>

</div>

<script>

function track(){

let email=document.getElementById("email").value;

fetch("https://script.google.com/macros/s/AKfycbwVsiu_UTQRZuWePIzs-H8B5lm_YmOw93pIELhX0cV9tDcQ42jIqF7RPzGNaIv8t3_2/exec?email="+email)

.then(res=>res.json())

.then(data=>{

if(data.status=="Not Found"){
alert("No booking found");
return;
}

document.getElementById("name").innerText=data.name;
document.getElementById("showEmail").innerText=data.email;
document.getElementById("application").innerText=data.application;
document.getElementById("label").innerText=data.label;
document.getElementById("status").innerText=data.status;
document.getElementById("update").innerText=data.update;

document.getElementById("result").style.display="block";

})

}

</script>

</body>
</html>
