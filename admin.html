<!DOCTYPE html>
<html>
<head>
<title>HCl Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body{font-family:Arial;padding:20px;background:#f4f4f4}
.login-box,.panel{max-width:400px;margin:auto;background:white;padding:20px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.2)}
.panel{display:none}
select{padding:5px;margin-top:5px}
button{padding:8px 15px;margin-top:10px;background:#2c5364;color:white;border:none;border-radius:5px}
</style>
</head>
<body>

<div class="login-box" id="loginBox">
<h2>Admin Login</h2>
<input type="text" id="username" placeholder="Username"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

<div class="panel" id="adminPanel">
<h2>Applications</h2>
<div id="applications"></div>
</div>

<script>
const supabase = window.supabase.createClient(
"https://vcaqgvcdttzzkkpziyiw.supabase.co",
"sb_publishable_s5P3XguntDCh98k-_kyElA_nDAXK_kR"
);

const ADMIN_USERNAME="shami7861900";
const ADMIN_PASSWORD="Aht786190";

function login(){
const user=document.getElementById("username").value;
const pass=document.getElementById("password").value;
if(user===ADMIN_USERNAME && pass===ADMIN_PASSWORD){
document.getElementById("loginBox").style.display="none";
document.getElementById("adminPanel").style.display="block";
loadApplications();
}else{alert("Invalid Username or Password");}
}

async function loadApplications(){
const { data } = await supabase.from("job_applications").select("*").order("created_at",{ascending:false});
let html="";
data.forEach(app=>{
html+=`<div style="border:1px solid #ccc;padding:10px;margin:10px 0;background:white">
<b>${app.full_name}</b><br>
Email: ${app.email}<br>
Position: ${app.job_position}<br><br>
Status:
<select onchange="updateStatus(${app.id}, this.value)">
<option ${app.status=="Application Received"?"selected":""}>Application Received</option>
<option ${app.status=="Interview Test"?"selected":""}>Interview Test</option>
<option ${app.status=="Offer Letter"?"selected":""}>Offer Letter</option>
<option ${app.status=="Visa Processing"?"selected":""}>Visa Processing</option>
<option ${app.status=="Approved"?"selected":""}>Approved</option>
<option ${app.status=="Rejected"?"selected":""}>Rejected</option>
</select></div>`;
});
document.getElementById("applications").innerHTML=html;
}

async function updateStatus(id,status){
await supabase.from("job_applications").update({status:status}).eq("id",id);
alert("Status Updated Successfully");
}
</script>
</body>
</html>
