<!DOCTYPE html>
<html>
<head>

<title>HCL Job Portal</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

.container{
width:90%;
max-width:700px;
margin:auto;
background:white;
padding:30px;
margin-top:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

.progress{
width:100%;
background:#ddd;
height:20px;
border-radius:20px;
margin-bottom:20px;
}

.progress-bar{
height:20px;
background:#28a745;
width:12%;
border-radius:20px;
}

.step{
display:none;
}

.step.active{
display:block;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 20px;
border:none;
background:#007bff;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>

</head>
<body>

<div class="container">

<h2>HCL Job Application</h2>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<form id="jobForm" enctype="multipart/form-data">

<!-- STEP 1 PERSONAL -->

<div class="step active">

<h3>Personal Information</h3>

<label>Full Name</label>
<input type="text" name="fullname" required>

<label>Father Name</label>
<input type="text" name="fathername" required>

<label>Date of Birth</label>
<input type="date" id="dob" name="dob" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Phone</label>
<input type="tel" name="phone" required>

<label>Country</label>
<select name="country" required>

<option value="">Select Country</option>
<option>🇵🇭 Philippines</option>
<option>🇻🇳 Vietnam</option>
<option>🇹🇷 Turkey</option>
<option>🇫🇷 France</option>
<option>🇮🇩 Indonesia</option>
<option>🇨🇳 China</option>
<option>🇵🇰 Pakistan</option>
<option>🇮🇳 India</option>
<option>🇮🇹 Italy</option>
<option>🇪🇸 Spain</option>
<option>🇵🇱 Poland</option>
<option>🇦🇹 Austria</option>
<option>🇩🇪 Germany</option>
<option>🇹🇼 Taiwan</option>

<option value="other">Other</option>

</select>

<button type="button" onclick="nextStep()">Next</button>

</div>

<!-- STEP 2 ADDRESS -->

<div class="step">

<h3>Address Details</h3>

<label>Home Address</label>
<input type="text" name="address" required>

<label>City</label>
<input type="text" name="city" required>

<label>State / Province</label>
<input type="text" name="state" required>

<label>Postal Code</label>
<input type="text" name="postal" required>

<button type="button" onclick="prevStep()">Back</button>
<button type="button" onclick="nextStep()">Next</button>

</div>

<!-- STEP 3 EDUCATION -->

<div class="step">

<h3>Education</h3>

<select name="qualification" required>

<option value="">Highest Qualification</option>
<option>High School</option>
<option>Bachelor</option>
<option>Master</option>
<option>PhD</option>
<option>Other</option>

</select>

<label>Institute Name</label>
<input type="text" name="institute">

<label>Passing Year</label>
<input type="number" name="year">

<label>Field Subject</label>
<input type="text" name="subject">

<label>Upload Education Documents</label>
<input type="file" name="educationFile">

<button type="button" onclick="prevStep()">Back</button>
<button type="button" onclick="nextStep()">Next</button>

</div>

<!-- STEP 4 EXPERIENCE -->

<div class="step">

<h3>Work Experience</h3>

<label>Company Name</label>
<input type="text" name="company">

<label>Job Role</label>
<input type="text" name="role">

<label>Experience Years</label>
<input type="number" name="exp">

<button type="button" onclick="prevStep()">Back</button>
<button type="button" onclick="nextStep()">Next</button>

</div>

<!-- STEP 5 PASSPORT -->

<div class="step">

<h3>Passport</h3>

<label>Passport Number</label>
<input type="text" name="passport">

<label>Date of Issue</label>
<input type="date" name="issue">

<label>Date of Expiry</label>
<input type="date" name="expiry">

<label>Upload Passport</label>
<input type="file" name="passportFile">

<button type="button" onclick="prevStep()">Back</button>
<button type="button" onclick="nextStep()">Next</button>

</div>

<!-- STEP 6 JOB POSITION -->

<div class="step">

<h3>Job Position</h3>

<select name="position" required>

<option>Chief Cleaner</option>
<option>Crew Member</option>
<option>Dish Washer</option>
<option>Assistant Manager</option>
<option>Supervisor</option>
<option>Office Worker</option>
<option>Waiter</option>
<option>Reception</option>
<option>Kitchen Helper</option>
<option>Shift Head</option>

</select>

<label>Shift</label>

<select name="shift">

<option>Morning Shift</option>
<option>Night Shift</option>

</select>

<button type="button" onclick="prevStep()">Back</button>
<button type="button" onclick="nextStep()">Next</button>

</div>

<!-- STEP 7 UPLOAD -->

<div class="step">

<h3>Upload CV & Picture</h3>

<label>Upload CV</label>
<input type="file" name="cv" required>

<label>Upload Picture</label>
<input type="file" name="photo" required>

<button type="button" onclick="prevStep()">Back</button>
<button type="button" onclick="nextStep()">Next</button>

</div>

<!-- STEP 8 SUBMIT -->

<div class="step">

<h3>Submit Application</h3>

<button type="button" onclick="prevStep()">Back</button>

<button type="submit">Submit Application</button>

</div>

</form>

</div>

<script>

let step=0;

const steps=document.querySelectorAll(".step");
const progress=document.getElementById("progressBar");

function showStep(){
steps.forEach((s,i)=>{
s.classList.remove("active");
if(i===step)s.classList.add("active");
});

progress.style.width=((step+1)/steps.length*100)+"%";
}

function nextStep(){

if(step==0){

let dob=document.getElementById("dob").value;
let age=new Date().getFullYear()-new Date(dob).getFullYear();

if(age<18){

alert("Age must be 18+");
return;

}

}

step++;

if(step>=steps.length)step=steps.length-1;

showStep();

}

function prevStep(){

step--;

if(step<0)step=0;

showStep();

}

showStep();

</script>

</body>
                                                 </html>
