<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HCL Restaurant</title>
  <style>
    /* Reset */
    * {margin:0; padding:0; box-sizing:border-box; font-family:'Arial', sans-serif;}
    
    /* Navbar */
    .navbar {display:flex; justify-content:space-between; align-items:center; background:linear-gradient(90deg,#FF7E5F,#FEB47B); padding:15px 30px; position:sticky; top:0; z-index:100;}
    .navbar .logo {font-size:1.8em; font-weight:bold; color:#fff;}
    .navbar .nav-links {list-style:none; display:flex; gap:20px;}
    .navbar .nav-links li a {text-decoration:none; color:#fff; font-weight:bold; transition:0.3s;}
    .navbar .nav-links li a:hover {color:#000;}
    
    /* Search */
    .search-box input {padding:5px 10px; border-radius:5px; border:none;}
    .search-box button {padding:5px 10px; border:none; background:#fff; color:#FF7E5F; font-weight:bold; border-radius:5px; cursor:pointer;}
    
    /* Hero */
    .hero {height:90vh; background:url('https://source.unsplash.com/1600x900/?restaurant,food') center/cover no-repeat; display:flex; flex-direction:column; justify-content:center; align-items:center; color:#fff; text-align:center;}
    .hero h1 {font-size:3em; text-shadow:2px 2px 8px rgba(0,0,0,0.7);}
    .hero p {font-size:1.5em; margin-top:10px;}
    
    /* Featured */
    .featured {padding:50px; text-align:center; background:#f7f7f7;}
    .featured h2 {font-size:2.5em; margin-bottom:30px; color:#FF7E5F;}
    .cards {display:flex; justify-content:center; gap:30px; flex-wrap:wrap;}
    .card {background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 10px 20px rgba(0,0,0,0.2); transition:0.3s;}
    .card img {width:300px; height:200px; object-fit:cover;}
    .card h3 {padding:15px; color:#333;}
    .card:hover {transform:scale(1.05);}
    
    /* Footer */
    footer {text-align:center; padding:20px; background:linear-gradient(90deg,#FEB47B,#FF7E5F); color:#fff; margin-top:30px;}
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">HCL Restaurant</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Menu</a></li>
      <li><a href="#">Jobs</a></li>
      <li><a href="#">Tracking</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search page...">
      <button onclick="searchPage()">Search</button>
    </div>
  </nav>

  <!-- Hero Section -->
  <header class="hero">
    <h1>Welcome to HCL Restaurant</h1>
    <p>Delicious food delivered with love 🍽️</p>
  </header>

  <!-- Featured Section -->
  <section class="featured">
    <h2>Our Specials</h2>
    <div class="cards">
      <div class="card">
        <img src="https://source.unsplash.com/300x200/?food" alt="Food">
        <h3>Delicious Meals</h3>
      </div>
      <div class="card">
        <img src="https://source.unsplash.com/300x200/?restaurant" alt="Ambiance">
        <h3>Cozy Ambiance</h3>
      </div>
      <div class="card">
        <img src="https://source.unsplash.com/300x200/?dessert" alt="Dessert">
        <h3>Sweet Desserts</h3>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 HCL Restaurant. All rights reserved.</p>
  </footer>

  <script>
    function searchPage() {
      const input = document.getElementById("searchInput").value.toLowerCase();
      if(input === "home") alert("You are already on Home page!");
      else if(input === "about") alert("Go to About page (Not yet created)");
      else if(input === "menu") alert("Go to Menu page (Not yet created)");
      else if(input === "jobs") alert("Go to Jobs page (Not yet created)");
      else if(input === "tracking") alert("Go to Tracking page (Not yet created)");
      else if(input === "contact") alert("Go to Contact page (Not yet created)");
      else alert("Page not found!");
    }
  </script>
</body>
</html>
