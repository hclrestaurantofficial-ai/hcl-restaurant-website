<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCL Restaurant</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f5f5f5;}
header{display:flex;justify-content:space-between;align-items:center;background:#111;color:white;padding:15px 40px;position:sticky;top:0;z-index:100;}
.logo{font-size:24px;font-weight:bold;}
nav a{color:white;margin:0 15px;text-decoration:none;font-weight:bold;}
nav a:hover{color:orange;}
.hero{height:70vh;display:flex;align-items:center;justify-content:center;text-align:center;color:white;background:url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4") center/cover;background-size:cover;}
.hero h1{font-size:50px;background:rgba(0,0,0,0.6);padding:20px;border-radius:10px;}
.search-container{text-align:center;margin:20px;}
.search-container input{padding:10px;width:300px;font-size:16px;border-radius:5px;border:1px solid #ccc;}
.gallery{padding:50px;text-align:center;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.grid img{width:100%;height:220px;object-fit:cover;border-radius:10px;}
footer{background:#111;color:white;text-align:center;padding:20px;}
</style>
</head>
<body>

<header>
<div class="logo">HCL Restaurant</div>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="menu.html">Menu</a>
<a href="careers.html">Careers</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Welcome to HCL Restaurant</h1>
</section>

<div class="search-container">
<input type="text" id="siteSearch" placeholder="Search pages..." onkeyup="searchPage(event)">
</div>

<section class="gallery">
<h2>Our Restaurant</h2>
<div class="grid">
<img src="https://source.unsplash.com/600x400/?restaurant">
<img src="https://source.unsplash.com/600x400/?restaurant,interior">
<img src="https://source.unsplash.com/600x400/?restaurant,building">
<img src="https://source.unsplash.com/600x400/?chef,cooking">
<img src="https://source.unsplash.com/600x400/?pizza">
<img src="https://source.unsplash.com/600x400/?restaurant,kitchen">
<img src="https://source.unsplash.com/600x400/?italian,food">
<img src="https://source.unsplash.com/600x400/?restaurant,outside">
</div>
</section>

<footer>
<p>© 2026 HCL Restaurant</p>
</footer>

<script>
function searchPage(event){
if(event.key === "Enter"){
let input = document.getElementById("siteSearch").value.toLowerCase().trim();
let pages = {
"home":"index.html",
"about":"about.html",
"menu":"menu.html",
"careers":"careers.html",
"contact":"contact.html"
};
if(pages[input]){
window.location.href = pages[input];
}else{
alert("Page not found! Type: Home, About, Menu, Careers, Contact");
}
}
}
</script>

</body>
</html>
