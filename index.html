<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCl Restaurant - Home</title>
    <style>
        /* Reset & base styles */
        body, html { margin:0; padding:0; height:100%; font-family: Arial, sans-serif; }

        /* Background images */
        body {
            background-size: cover;
            background-position: center;
            transition: background-image 1s ease-in-out;
        }

        /* Overlay for readability */
        body::before {
            content:"";
            position:fixed;
            top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.4);
            z-index:0;
        }

        /* Header */
        header { 
            position:relative;
            z-index:1;
            display:flex; 
            justify-content:space-between; 
            align-items:center; 
            padding:15px 30px; 
            background: rgba(255,87,34,0.8); 
            color:white;
            flex-wrap:wrap;
        }
        nav a { color:white; margin:0 10px; text-decoration:none; font-weight:bold; }
        nav a:hover { text-decoration:underline; }

        /* Search box */
        .search-box { display:flex; align-items:center; margin-top:5px; }
        .search-box input { padding:5px; width:150px; border-radius:3px; border:none; margin-right:5px; }
        .search-box button { padding:5px 10px; border:none; background:white; color:#ff5722; font-weight:bold; border-radius:3px; cursor:pointer; }
        .search-box button:hover { background:#fff3e0; }

        /* Main content */
        main { 
            position:relative;
            z-index:1;
            color:white; 
            text-align:center; 
            margin-top:100px;
        }
        main h1 { font-size:3em; margin-bottom:10px; text-shadow: 2px 2px 5px black; }
        main p { font-size:1.2em; text-shadow: 1px 1px 4px black; }

        /* Footer */
        footer { 
            position:relative;
            z-index:1;
            text-align:center; 
            padding:15px; 
            background: rgba(51,51,51,0.8); 
            color:white; 
            margin-top:50px;
        }

        @media(max-width:600px){
            header { flex-direction:column; align-items:flex-start; }
            nav { margin-top:10px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><h2>HCl Restaurant</h2></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="menu.html">Menu</a>
            <a href="jobs.html">Job Portal</a>
            <a href="tracking.html">Tracking</a>
        </nav>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search page...">
            <button onclick="searchPage()">Search</button>
        </div>
    </header>

    <main>
        <h1>Welcome to HCl Restaurant!</h1>
        <p>Experience the finest dishes and best service in town.</p>
    </main>

    <footer>
        <p>&copy; 2026 HCl Restaurant</p>
    </footer>

    <script>
        // Search functionality
        function searchPage() {
            const input = document.getElementById('searchInput').value.toLowerCase().trim();
            switch(input) {
                case 'home':
                    window.location.href = 'index.html';
                    break;
                case 'about':
                    window.location.href = 'about.html';
                    break;
                case 'menu':
                    window.location.href = 'menu.html';
                    break;
                case 'job portal':
                case 'jobs':
                    window.location.href = 'jobs.html';
                    break;
                case 'tracking':
                    window.location.href = 'tracking.html';
                    break;
                default:
                    alert('Page not found. Try Home, About, Menu, Job Portal, or Tracking.');
            }
        }

        // Automatic background images
        const images = [
            'https://source.unsplash.com/1600x900/?restaurant,food',
            'https://source.unsplash.com/1600x900/?dining',
            'https://source.unsplash.com/1600x900/?chef',
            'https://source.unsplash.com/1600x900/?cuisine',
            'https://source.unsplash.com/1600x900/?restaurant,interior'
        ];
        let current = 0;
        function changeBackground() {
            document.body.style.backgroundImage = `url('${images[current]}')`;
            current = (current + 1) % images.length;
        }
        changeBackground();
        setInterval(changeBackground, 5000); // change every 5 seconds
    </script>
</body>
  </html>
