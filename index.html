<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCl Restaurant Job Application</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: url('https://images.pexels.com/photos/349610/pexels-photo-349610.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2') no-repeat center center fixed;
    background-size: cover;
    padding: 20px;
}
.container {
    max-width: 600px;
    margin: auto;
    background: rgba(255,255,255,0.95);
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
h1 { text-align: center; margin-bottom: 20px; }
input, select, button {
    width: 100%; padding: 10px; margin: 10px 0;
}
button { cursor: pointer; }
.form-step { display: none; }
.form-step-active { display: block; }
#progress-bar { width: 100%; height: 10px; background: #ddd; border-radius: 5px; margin-bottom: 20px; }
#progress { height: 100%; width: 0%; background: #4caf50; border-radius: 5px; transition: width 0.3s;}
</style>
</head>
<body>

<div class="container">
<h1>HCl Restaurant Job Application</h1>

<div id="progress-bar"><div id="progress"></div></div>

<form id="jobForm" action="https://formspree.io/f/xykdozek" method="POST" enctype="multipart/form-data">

<!-- Step 1 -->
<div class="form-step form-step-active">
<h2>Step 1: Personal Information</h2>
<input type="text" name="fullName" placeholder="Full Name" required>
<input type="text" name="fatherName" placeholder="Father's Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="tel" name="phone" placeholder="Phone (+country code)" required>
<input type="text" name="nationality" placeholder="Nationality" required>
<input type="text" name="idNumber" placeholder="ID Number" required>
<input type="date" name="dob" required>
<select name="country" required>
  <option value="">Select Country</option>
  <option value="🇵🇭 Philippines">🇵🇭 Philippines</option>
  <option value="🇻🇳 Vietnam">🇻🇳 Vietnam</option>
  <option value="🇹🇷 Turkey">🇹🇷 Turkey</option>
  <option value="🇫🇷 France">🇫🇷 France</option>
  <option value="🇮🇩 Indonesia">🇮🇩 Indonesia</option>
  <option value="🇨🇳 China">🇨🇳 China</option>
  <option value="🇵🇰 Pakistan">🇵🇰 Pakistan</option>
  <option value="🇮🇳 India">🇮🇳 India</option>
  <option value="🇮🇹 Italy">🇮🇹 Italy</option>
  <option value="🇮🇹 Naples">🇮🇹 Naples</option>
  <option value="🇹🇼 Taiwan">🇹🇼 Taiwan</option>
  <option value="other">Other</option>
</select>
<input type="text" name="otherCountry" placeholder="Enter Country" style="display:none;">
<button type="button" class="next-btn">Next</button>
</div>

<!-- Step 2 -->
<div class="form-step">
<h2>Step 2: Address</h2>
<input type="text" name="address" placeholder="Home Address" required>
<input type="text" name="city" placeholder="City" required>
<input type="text" name="state" placeholder="State / Province" required>
<input type="text" name="postal" placeholder="Postal Code" required>
<button type="button" class="prev-btn">Previous</button>
<button type="button" class="next-btn">Next</button>
</div>

<!-- Step 3 -->
<div class="form-step">
<h2>Step 3: Education</h2>
<select name="qualification" id="qualification" required>
  <option value="">Highest Qualification</option>
  <option>High School</option>
  <option>Bachelor</option>
  <option>Master</option>
  <option>PhD</option>
  <option>Other</option>
  <option value="No">No Education</option>
</select>
<input type="text" name="institute" placeholder="Institute Name" id="institute">
<input type="number" name="passingYear" placeholder="Passing Year" id="passingYear">
<input type="file" name="certificate" id="certificate" accept=".pdf,.jpg,.png">
<button type="button" class="prev-btn">Previous</button>
<button type="button" class="next-btn">Next</button>
</div>

<!-- Step 4 -->
<div class="form-step">
<h2>Step 4: Work Experience</h2>
<input type="text" name="company" placeholder="Company Name" id="company">
<input type="text" name="jobTitle" placeholder="Job Title" id="jobTitle">
<input type="text" name="location" placeholder="Location" id="location">
<input type="number" name="yearsExp" placeholder="Years" id="yearsExp">
<input type="number" name="monthsExp" placeholder="Months" id="monthsExp">
<label><input type="checkbox" id="noExperience"> No Experience</label>
<button type="button" class="prev-btn">Previous</button>
<button type="button" class="next-btn">Next</button>
</div>

<!-- Step 5 -->
<div class="form-step">
<h2>Step 5: Job Position</h2>
<select name="jobPosition" required>
  <option value="">Select Position</option>
  <option>Chief</option>
  <option>Cleaner</option>
  <option>Crew Member</option>
  <option>Dishwasher</option>
  <option>Assistant Manager</option>
  <option>Supervisor</option>
  <option>Office Worker</option>
  <option>CEO Assistant</option>
  <option>Reception</option>
  <option>Master Chef</option>
  <option>Waiter</option>
  <option>Food Management Assistant</option>
</select>
<button type="button" class="prev-btn">Previous</button>
<button type="button" class="next-btn">Next</button>
</div>

<!-- Step 6 -->
<div class="form-step">
<h2>Step 6: Passport</h2>
<input type="text" name="passportNumber" placeholder="Passport Number" id="passportNumber">
<input type="date" name="dateIssue" placeholder="Date of Issue" id="dateIssue">
<input type="date" name="dateExpiry" placeholder="Date of Expiry" id="dateExpiry">
<label><input type="checkbox" id="noPassport"> No Passport</label>
<button type="button" class="prev-btn">Previous</button>
<button type="button" class="next-btn">Next</button>
</div>

<!-- Step 7 -->
<div class="form-step">
<h2>Step 7: Upload Documents</h2>
<label>Upload CV</label>
<input type="file" name="cv" id="cv" accept=".pdf,.jpg,.png" required>
<label>Upload Picture</label>
<input type="file" name="picture" id="picture" accept=".jpg,.png" required>
<button type="button" class="prev-btn">Previous</button>
<button type="button" class="next-btn">Next</button>
</div>

<!-- Step 8 -->
<div class="form-step">
<h2>Step 8: Review & Submit</h2>
<p>Click Submit to send your application.</p>
<button type="button" class="prev-btn">Previous</button>
<button type="submit">Submit Application</button>
</div>

</form>
</div>

<script>
// Navigation
const form = document.getElementById('jobForm');
const steps = document.querySelectorAll('.form-step');
const nextBtns = document.querySelectorAll('.next-btn');
const prevBtns = document.querySelectorAll('.prev-btn');
const progress = document.getElementById('progress');
let currentStep = 0;
function updateProgress(){ progress.style.width = ((currentStep+1)/steps.length)*100+'%'; }
nextBtns.forEach(btn=>btn.addEventListener('click',()=>{
  if(!validateStep()) return;
  steps[currentStep].classList.remove('form-step-active');
  currentStep++;
  steps[currentStep].classList.add('form-step-active');
  updateProgress();
}));
prevBtns.forEach(btn=>btn.addEventListener('click',()=>{
  steps[currentStep].classList.remove('form-step-active');
  currentStep--;
  steps[currentStep].classList.add('form-step-active');
  updateProgress();
}));

// Conditional fields
const countrySelect=form.querySelector('select[name="country"]');
const otherCountry=form.querySelector('input[name="otherCountry"]');
countrySelect.addEventListener('change',()=>{otherCountry.style.display=countrySelect.value==='other'?'block':'none';});

// Education toggle
const qualification=document.getElementById('qualification');
const institute=document.getElementById('institute');
const passingYear=document.getElementById('passingYear');
const certificate=document.getElementById('certificate');
qualification.addEventListener('change',()=>{const isNo=qualification.value==='No'; institute.style.display=passingYear.style.display=certificate.style.display=isNo?'none':'block';});

// No experience
document.getElementById('noExperience').addEventListener('change',e=>{
  const disable=e.target.checked;
  ['company','jobTitle','location','yearsExp','monthsExp'].forEach(id=>document.getElementById(id).disabled=disable);
});

// No passport
document.getElementById('noPassport').addEventListener('change',e=>{
  ['passportNumber','dateIssue','dateExpiry'].forEach(id=>document.getElementById(id).disabled=e.target.checked);
});

// File size validation
function validateFileSize(id){const f=document.getElementById(id); if(f.files[0]&&f.files[0].size>2*1024*1024){alert('File must be ≤2MB'); return false;} return true;}

// Validate step
function validateStep(){ const inputs=steps[currentStep].querySelectorAll('input,select'); for(let i of inputs){ if(i.hasAttribute('required')&&!i.value){ alert('Fill required fields'); return false;} if(['certificate','cv','picture'].includes(i.id)){ if(!validateFileSize(i.id)) return false; } } return true; }
</script>

</body>
  </html>
