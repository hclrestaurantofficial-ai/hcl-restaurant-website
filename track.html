<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HCl Restaurant Application Tracking</title>
<style>
body{font-family:Arial;margin:0;background:linear-gradient(135deg,#141e30,#243b55);color:white;text-align:center;}
header{background:black;padding:25px;font-size:30px;font-weight:bold;}
.container{margin-top:50px;}
input{padding:12px;width:300px;font-size:16px;}
button{padding:12px 20px;font-size:16px;background:#ff6600;color:white;border:none;cursor:pointer;}
button:hover{background:#ff3300;}
table{margin:40px auto;border-collapse:collapse;background:white;color:black;width:60%;}
th{background:#333;color:white;padding:12px;}
td{padding:12px;border-bottom:1px solid #ddd;}
</style>
</head>
<body>

<header>HCl Restaurant Application Tracking</header>

<div class="container">
<h2>Check Your Application Status</h2>
<input type="email" id="email" placeholder="Enter your email">
<button onclick="checkStatus()">Check Status</button>

<table id="result" style="display:none;">
<tr><th>Name</th><th>Email</th><th>Status</th><th>Last Update</th></tr>
<tr>
<td id="name"></td>
<td id="emailResult"></td>
<td id="status"></td>
<td id="update"></td>
</tr>
</table>

<p id="notfound"></p>
</div>

<script>
// ✅ Your Apps Script URL
const apiURL = 'https://script.google.com/macros/s/AKfycbxswuuvPyozalKoWkF7Bw-r0gjkYesP5b1WKt_mti-ovqu2RR4gSqFUvH4k5DUPHwIluw/exec';

function checkStatus(){
    const emailInput = document.getElementById("email").value.trim();
    if(!emailInput){
        alert("Please enter an email");
        return;
    }

    fetch(`${apiURL}?email=${encodeURIComponent(emailInput)}`)
    .then(res => res.json())
    .then(data => {
        if(data.length > 0){
            const app = data[0];
            document.getElementById("result").style.display = "table";
            document.getElementById("name").innerText = app.name;
            document.getElementById("emailResult").innerText = app.email;
            document.getElementById("status").innerText = app.status;
            document.getElementById("update").innerText = app.lastupdate;
            document.getElementById("notfound").innerText="";
        } else {
            document.getElementById("result").style.display = "none";
            document.getElementById("notfound").innerText="No Application Found.";
        }
    })
    .catch(err => {
        console.log(err);
        document.getElementById("notfound").innerText="Error fetching data.";
    });
}
</script>

</body>
</html>
