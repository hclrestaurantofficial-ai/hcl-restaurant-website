<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tracking - HCL Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Roboto;
background:#f4f4f4;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
background:#f04;
padding:15px 30px;
color:white;
}

nav a{
color:white;
text-decoration:none;
margin:0 10px;
font-weight:bold;
}

nav a:hover{
text-decoration:underline;
}

/* HERO */

.hero{
height:35vh;
display:flex;
justify-content:center;
align-items:center;
background:url("https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=1950&q=80");
background-size:cover;
color:white;
}

.hero h1{
background:rgba(0,0,0,0.6);
padding:15px 25px;
border-radius:10px;
}

/* TRACKING BOX */

.tracking-box{
max-width:600px;
margin:40px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
text-align:center;
}

.tracking-box h2{
color:#f04;
}

.tracking-box input{
width:90%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

.tracking-box button{
margin-top:15px;
padding:12px 20px;
border:none;
background:#f04;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

.tracking-box button:hover{
background:#c02;
}

/* STATUS CARD */

.status-card{
display:none;
margin-top:25px;
padding:20px;
border-radius:10px;
background:linear-gradient(135deg,#f9a825,#f04);
color:white;
}

.status-card p{
font-size:18px;
margin:8px 0;
}

/* FOOTER */

footer{
text-align:center;
padding:15px;
background:#222;
color:white;
margin-top:40px;
}

</style>
</head>

<body>

<nav>

<div>

<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="menu.html">Menu</a>
<a href="jobs.html">Jobs</a>
<a href="contact.html">Contact</a>
<a href="tracking.html">Tracking</a>

</div>

</nav>

<div class="hero">
<h1>Check Your Booking Status</h1>
</div>

<div class="tracking-box">

<h2>Tracking</h2>

<p>Enter your email to check your reservation status</p>

<input type="email" id="email" placeholder="Enter your email">

<br>

<button onclick="checkStatus()">Check Status</button>

<div class="status-card" id="statusCard">

<p><strong>Name:</strong> <span id="name"></span></p>

<p><strong>Email:</strong> <span id="showEmail"></span></p>

<p><strong>Status:</strong> <span id="status"></span></p>

<p><strong>Last Update:</strong> <span id="update"></span></p>

</div>

</div>

<footer>
© 2026 HCL Restaurant
</footer>

<script>

function checkStatus(){

let email=document.getElementById("email").value;

fetch("https://script.google.com/macros/s/AKfycbwVsiu_UTQRZuWePIzs-H8B5lm_YmOw93pIELhX0cV9tDcQ42jIqF7RPzGNaIv8t3_2/exec?email="+email)

.then(response => response.json())

.then(data => {

if(data.status=="Not Found"){

alert("No booking found with this email");

return;

}

document.getElementById("name").innerText=data.name;
document.getElementById("showEmail").innerText=data.email;
document.getElementById("status").innerText=data.status;
document.getElementById("update").innerText=data.update;

document.getElementById("statusCard").style.display="block";

})

}

</script>

</body>
</html>
