<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HCL Restaurant</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background-image:url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4");
background-size:cover;
background-position:center;
height:100vh;
color:white;
}

/* top navbar */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.8);
padding:15px 40px;
}

.logo{
font-size:26px;
font-weight:bold;
color:#ffcc00;
}

.nav-links a{
color:white;
text-decoration:none;
margin:0 12px;
font-size:16px;
transition:0.3s;
}

.nav-links a:hover{
color:#ffcc00;
}

/* search box */

.search-box input{
padding:7px;
border:none;
border-radius:4px;
}

.search-box button{
padding:7px 12px;
border:none;
background:#ffcc00;
cursor:pointer;
border-radius:4px;
}

/* hero section */

.hero{
text-align:center;
margin-top:120px;
}

.hero h1{
font-size:55px;
margin-bottom:10px;
}

.hero p{
font-size:22px;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:#ffcc00;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:6px;
}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">HCL Restaurant</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="menu.html">Menu</a>
<a href="careers.html">Careers</a>
<a href="contact.html">Contact</a>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="Search page...">
<button onclick="searchPage()">Search</button>
</div>

</div>


<div class="hero">
<h1>Welcome to HCL Restaurant</h1>
<p>Delicious Food • Best Taste • Fresh Ingredients</p>

<a href="menu.html" class="btn">View Our Menu</a>
</div>


<script>

function searchPage(){

let page=document.getElementById("search").value.toLowerCase();

if(page=="home"){
window.location="index.html";
}

else if(page=="about"){
window.location="about.html";
}

else if(page=="menu"){
window.location="menu.html";
}

else if(page=="careers"){
window.location="careers.html";
}

else if(page=="contact"){
window.location="contact.html";
}

else{
alert("Page not found");
}

}

</script>

</body>
  </html>
