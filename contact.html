<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - HCL Restaurant</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin:0;
            padding:0;
            font-family: 'Roboto', sans-serif;
            background: #f5f5f5;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f04;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .search-box {
            display: flex;
            align-items: center;
        }

        .search-box input {
            padding: 5px 10px;
            border-radius: 5px 0 0 5px;
            border: none;
            outline: none;
        }

        .search-box button {
            padding: 5px 10px;
            border: none;
            border-radius: 0 5px 5px 0;
            background: #222;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .search-box button:hover {
            background: #000;
        }

        /* Hero Section */
        .hero {
            height: 25vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092?auto=format&fit=crop&w=1950&q=80') no-repeat center center;
            background-size: cover;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
            background: rgba(0,0,0,0.5);
            padding: 1rem 2rem;
            border-radius: 10px;
        }

        /* Contact Section */
        .contact-section {
            padding: 3rem 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .contact-info {
            background: linear-gradient(135deg, #f9a825, #f04);
            color: white;
            padding: 2rem;
            border-radius: 15px;
            margin-bottom: 3rem;
            text-align: center;
        }

        .contact-info h2 {
            margin-bottom: 1rem;
        }

        .contact-info p {
            font-size: 1.2rem;
            margin: 0.5rem 0;
        }

        /* Feedback Form */
        .feedback-form {
            background: #fff;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .feedback-form h2 {
            color: #f04;
            margin-bottom: 1rem;
            text-align: center;
        }

        .feedback-form form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .feedback-form input,
        .feedback-form textarea {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1rem;
            outline: none;
        }

        .feedback-form button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #f04;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .feedback-form button:hover {
            background: #c03;
        }

        footer {
            text-align: center;
            padding: 1rem;
            background: #222;
            color: white;
        }

        @media(max-width:600px){
            .contact-info, .feedback-form {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="menu.html">Menu</a>
            <a href="jobs.html">Jobs</a>
            <a href="contact.html">Contact</a>
            <a href="tracking.html">Tracking</a>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search page...">
            <button onclick="searchPage()">Go</button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Contact Us</h1>
    </section>

    <!-- Contact Info -->
    <section class="contact-section">
        <div class="contact-info">
            <h2>Head Office</h2>
            <p><strong>Email:</strong> hclrestaurantofficial@gmail.com</p>
            <p><strong>Address:</strong> Centro sportivo universitario Le Torri, 376 Lungotevere Dante, Rome, Italy</p>
        </div>

        <!-- Feedback Form -->
        <div class="feedback-form">
            <h2>Send Feedback</h2>
            <form action="https://formspree.io/f/xwvrpbza" method="POST">
                <input type="text" name="Full Name" placeholder="Full Name" required>
                <input type="email" name="Email" placeholder="Email" required>
                <input type="tel" name="Phone" placeholder="Phone (+Country Code)">
                <textarea name="Message" placeholder="Your Feedback" rows="5" required></textarea>
                <button type="submit">Submit Feedback</button>
            </form>
        </div>
    </section>

    <footer>
        &copy; 2026 HCL Restaurant. All Rights Reserved.
    </footer>

    <script>
        function searchPage() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            if(input.includes('home')) window.location.href = 'index.html';
            else if(input.includes('about')) window.location.href = 'about.html';
            else if(input.includes('menu')) window.location.href = 'menu.html';
            else if(input.includes('jobs')) window.location.href = 'jobs.html';
            else if(input.includes('contact')) window.location.href = 'contact.html';
            else if(input.includes('tracking')) window.location.href = 'tracking.html';
            else alert('Page not found! Please type: Home, About, Menu, Jobs, Contact, or Tracking');
        }
    </script>

</body>
  </html>
