<style>
body{
    margin:0;
    font-family:'Georgia', serif;
    background:url('https://images.unsplash.com/photo-1601924582975-7e62b6e2d0b0') center/cover no-repeat;
    background-size:cover;
    color:white;
}
nav{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    padding:15px;
    z-index:1000;

nav a{

    padding:10px 20px;

}
nav a:hover{

    color:black;
}
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:rgba(0,0,0,0.4);
    padding-top:70px; /* for nav height */
}
h1{
    font-size:60px;
    color:gold;
    margin-bottom:20px;
    text-shadow:2px 2px 8px #000;
}
p{
    font-size:22px;
    max-width:700px;
    color:white;
    margin-bottom:30px;
}
@media(max-width:600px){
    h1{font-size:40px;}
    p{font-size:18px;}
    nav a{padding:8px 15px; margin:5px;}
