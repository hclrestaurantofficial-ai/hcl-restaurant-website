<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCl Restaurant - Welcome</title>
<style>
body{
    margin:0;
    font-family:'Georgia', serif;
    background:url('https://images.unsplash.com/photo-1601924582975-7e62b6e2d0b0') center/cover no-repeat;
    background-size:cover;
    color:white;
}
.overlay{
    background:rgba(0,0,0,0.6);
    height:100vh;
    width:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding-top:50px;
}
h1{
    font-size:60px;
    color:gold;
    margin-bottom:20px;
    text-shadow:2px 2px 8px #000;
}
p{
    font-size:22px;
    max-width:700px;
    color:white;
    margin-bottom:30px;
}
nav{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    padding:15px;
    background:rgba(0,0,0,0.85);
    z-index:1000;
}
nav a{
    margin:0 15px;
    padding:10px 20px;
    background:gold;
    color:black;
    text-decoration:none;
    font-weight:bold;
    border-radius:5px;
    transition:0.3s;
}
nav a:hover{
    background:white;
    color:black;
}
input[type="text"]{
    padding:12px;
    border-radius:5px;
    border:none;
    font-size:16px;
    width:250px;
    margin-right:10px;
}
button{
    padding:12px 20px;
    border:none;
    border-radius:5px;
    background:gold;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    background:white;
    color:black;
}
@media(max-width:600px){
    h1{font-size:40px;}
    p{font-size:18px;}
    input[type="text"]{width:150px;}
}
</style>
</head>
<body>

<!-- Sticky Navigation -->
<nav>
<a href="home.html">Home</a>
<a href="about.html">About</a>
<a href="menu.html">Menu</a>
<a href="careers.html">Careers</a>
<a href="contact.html">Contact</a>
</nav>

<div class="overlay">
<h1>Welcome to HCl Restaurant</h1>
<p>Experience authentic Italian cuisine in the heart of Rome, Italy. Explore our menu, meet our staff, and discover the finest international flavors!</p>

<!-- Search Bar -->
<div>
<input type="text" id="pageSearch" placeholder="Type page name...">
<button onclick="searchPage()">Go</button>
</div>
</div>

<script>
function searchPage(){
    const query = document.getElementById('pageSearch').value.toLowerCase().trim();
    // Map search query to page
    const pages = {
        'home':'home.html',
        'about':'about.html',
        'menu':'menu.html',
        'careers':'careers.html',
        'contact':'contact.html'
    };
    if(pages[query]){
        window.location.href = pages[query];
    } else {
        alert('Page not found. Try Home, About, Menu, Careers, or Contact.');
    }
}
</script>

</body>
  </html>
