<!DOCTYPE html>
<html>
<head>
<title>Check Application Status</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:white;text-align:center;padding:40px;}
.box{background:white;color:black;max-width:400px;margin:auto;padding:20px;border-radius:10px;box-shadow:0 0 20px rgba(0,0,0,0.4);}
input{width:90%;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #ccc;}
button{padding:10px 20px;background:#2c5364;color:white;border:none;border-radius:5px;cursor:pointer;}
.result{margin-top:20px;padding:15px;background:#f4f4f4;border-radius:8px;}
</style>
</head>
<body>

<div class="box">
<h2>Check Application Status</h2>
<input type="email" id="email" placeholder="Enter Your Email" required>
<input type="date" id="dob" required>
<button onclick="checkStatus()">Check Status</button>
<div id="result"></div>
</div>

<script>
const supabase = window.supabase.createClient(
"https://vcaqgvcdttzzkkpziyiw.supabase.co",
"sb_publishable_s5P3XguntDCh98k-_kyElA_nDAXK_kR"
);

async function checkStatus(){
const email=document.getElementById("email").value;
const dob=document.getElementById("dob").value;
if(!email || !dob){alert("Enter Email and DOB");return;}
const { data, error } = await supabase.from("job_applications").select("*").eq("email",email).eq("dob",dob);
if(error || data.length===0){
document.getElementById("result").innerHTML="<div class='result'>No Application Found</div>";
}else{
const app=data[0];
document.getElementById("result").innerHTML=`<div class='result'>
<b>Name:</b> ${app.full_name}<br><br>
<b>Position:</b> ${app.job_position}<br><br>
<b>Status:</b> ${app.status}<br><br>
<b>Applied On:</b> ${new Date(app.created_at).toLocaleDateString()}
</div>`;
}
}
</script>
</body>
</html>
