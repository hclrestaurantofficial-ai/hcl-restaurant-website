<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCl Restaurant - Application Tracking</title>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(to bottom, #111, #333);
    color: #fff;
    margin: 0;
    padding: 0;
    text-align: center;
}
h1 {
    color: gold;
    margin-top: 30px;
    text-shadow: 2px 2px 8px #000;
}
.container {
    max-width: 600px;
    margin: 40px auto;
    background: #222;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
}
input[type="email"] {
    width: 70%;
    padding: 12px;
    border-radius: 5px;
    border: none;
    font-size: 16px;
    margin-right: 10px;
}
button {
    padding: 12px 20px;
    border-radius: 5px;
    border: none;
    background: gold;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    background: white;
    color: black;
}
.steps {
    margin-top: 30px;
    text-align: left;
}
.step {
    padding: 10px;
    border-left: 5px solid #555;
    margin: 10px 0;
    border-radius: 5px;
    background: #111;
    transition: 0.3s;
}
.step.active {
    border-left-color: gold;
    background: #333;
    font-weight: bold;
}
</style>
</head>
<body>

<h1>HCl Restaurant Application Tracking</h1>

<div class="container">
    <p>Enter your email to check your application status:</p>
    <input type="email" id="email" placeholder="your@email.com">
    <button onclick="checkStatus()">Check Status</button>

    <div class="steps" id="stepsContainer" style="display:none;">
        <div class="step" id="s1">CV Received</div>
        <div class="step" id="s2">Manager Review</div>
        <div class="step" id="s3">Pending Interview</div>
        <div class="step" id="s4">Test</div>
        <div class="step" id="s5">Approved</div>
        <div class="step" id="s6">Offer Letter</div>
        <div class="step" id="s7">Visa Processing</div>
    </div>
</div>

<script>
// Supabase configuration
const supabaseUrl = "https://xbmpynnvmtcsjnsclejd.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhibXB5bm52bXRjc2puc2NsZWpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTgzODAsImV4cCI6MjA4ODI3NDM4MH0.0a1_NBTacD2-onBEnrdHfKXbSp-AWSZca6JSvn-SzS8";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

async function checkStatus(){
    const email = document.getElementById("email").value.trim();
    if(!email) { alert("Please enter your email"); return; }

    const { data, error } = await supabaseClient
        .from("application_status")
        .select("*")
        .eq("email", email);

    if(error) {
        alert("Error fetching status");
        console.log(error);
        return;
    }

    const steps = ["s1","s2","s3","s4","s5","s6","s7"];
    steps.forEach(id => document.getElementById(id).classList.remove("active"));

    if(data.length > 0){
        document.getElementById("stepsContainer").style.display = "block";
        const status = data[0].status;
        // Map status to step index
        const statusOrder = {
            "CV Received": 0,
            "Manager Review": 1,
            "Pending Interview": 2,
            "Test": 3,
            "Approved": 4,
            "Offer Letter": 5,
            "Visa Processing": 6
        };
        const index = statusOrder[status] !== undefined ? statusOrder[status] : 0;

        for(let i=0; i<=index; i++){
            document.getElementById(steps[i]).classList.add("active");
        }

    } else {
        document.getElementById("stepsContainer").style.display = "none";
        alert("No application found for this email");
    }
}
</script>

</body>
</html>
