<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCL Restaurant Job Application</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  background: url('https://images.pexels.com/photos/262047/pexels-photo-262047.jpeg') no-repeat center center fixed;
  background-size: cover;
}
.container {
  max-width: 700px;
  margin: 30px auto;
  background: rgba(255, 255, 255, 0.9);
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(0,0,0,0.3);
}
.step { display: none; }
.step.active { display: block; }
.buttons { margin-top: 20px; }
button {
  padding: 10px 20px;
  margin-right: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  background: #4CAF50;
  color: white;
}
button:hover { opacity: 0.9; }
input, select { width: 100%; padding: 8px; margin: 6px 0 15px 0; border: 1px solid #ccc; border-radius: 5px; }
.summary { background: #eee; padding: 10px; border-radius: 5px; }
.step-dots { text-align: center; margin-bottom: 20px; }
.step-dots span {
  height: 15px;
  width: 15px;
  margin: 0 5px;
  background-color: #bbb;
  border-radius: 50%;
  display: inline-block;
}
.step-dots .active { background-color: #4CAF50; }
/* Flag selector styling */
.country-select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; width: 100%; margin-bottom: 15px; }
</style>
</head>
<body>

<div class="container">
  <h2>HCL Restaurant Job Application</h2>

  <!-- Step navigation -->
  <div class="step-dots" id="stepDots">
    <span class="dot active"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>

  <form id="jobForm" action="https://formspree.io/f/xykdozek" method="POST">

    <!-- Step 1 – Personal Details -->
    <div class="step active">
      <h3>Step 1: Personal Details</h3>
      <input type="text" name="candidate_name" placeholder="Full Name" required>
      <input type="date" id="dob" name="dob" placeholder="Date of Birth" required>
      <select name="gender" required>
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>
      <!-- Phone number with country flags -->
      <select name="phone_country" class="country-select" required>
        <option value="+1">🇺🇸 USA (+1)</option>
        <option value="+91">🇮🇳 India (+91)</option>
        <option value="+44">🇬🇧 UK (+44)</option>
        <option value="+86">🇨🇳 China (+86)</option>
        <option value="+62">🇮🇩 Indonesia (+62)</option>
        <option value="+84">🇻🇳 Vietnam (+84)</option>
        <option value="+7">🇷🇺 Russia (+7)</option>
        <option value="+81">🇯🇵 Japan (+81)</option>
        <option value="+66">🇹🇭 Thailand (+66)</option>
        <option value="other">Other</option>
      </select>
      <input type="tel" name="phone" placeholder="Phone Number" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="text" name="nationality_id" placeholder="Nationality / ID Number" required>
    </div>

    <!-- Step 2 – Address -->
    <div class="step">
      <h3>Step 2: Address</h3>
      <input type="text" name="house_address" placeholder="House Address" required>
      <input type="text" name="city" placeholder="City" required>
      <input type="text" name="state" placeholder="State / Province" required>
      <input type="text" name="postal_code" placeholder="Postal Code" required>
    </div>

    <!-- Step 3 – Education -->
    <div class="step">
      <h3>Step 3: Education</h3>
      <select name="qualification" required>
        <option value="">Highest Qualification</option>
        <option>High School</option>
        <option>Bachelor</option>
        <option>Master</option>
        <option>PhD</option>
        <option>Other</option>
        <option>No</option>
      </select>
      <input type="text" name="institute" placeholder="Institute Name">
      <input type="number" name="passing_year" placeholder="Passing Year">
      <input type="text" name="field_subject" placeholder="Field / Subject Name">
    </div>

    <!-- Step 4 – Passport Details -->
    <div class="step">
      <h3>Step 4: Passport Details</h3>
      <input type="text" name="passport_number" placeholder="Passport Number">
      <input type="date" name="passport_issue" placeholder="Date of Issue">
      <input type="date" name="passport_expiry" placeholder="Date of Expiry">
      <select name="passport_country" class="country-select">
        <option value="">Select Country</option>
        <option value="Vietnam">🇻🇳 Vietnam</option>
        <option value="Turkey">🇹🇷 Turkey</option>
        <option value="France">🇫🇷 France</option>
        <option value="Indonesia">🇮🇩 Indonesia</option>
        <option value="China">🇨🇳 China</option>
        <option value="Pakistan">🇵🇰 Pakistan</option>
        <option value="India">🇮🇳 India</option>
        <option value="Italy">🇮🇹 Italy</option>
        <option value="Naples">🇮🇹 Naples</option>
        <option value="Taiwan">🇹🇼 Taiwan</option>
        <option value="Philippines">🇵🇭 Philippines</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <!-- Step 5 – Work Experience -->
    <div class="step">
      <h3>Step 5: Work Experience</h3>
      <input type="text" name="company_name" placeholder="Company Name">
      <input type="text" name="job_role" placeholder="Job Role">
      <input type="text" name="skills" placeholder="Skills">
      <select name="no_experience">
        <option value="">Do you have no experience?</option>
        <option>No</option>
      </select>
    </div>

    <!-- Step 6 – Job Preferences -->
    <div class="step">
      <h3>Step 6: Job Preferences</h3>
      <select name="position" required>
        <option value="">Select Position Applying For</option>
        <option>Chief Cleaner</option>
        <option>Crew Member</option>
        <option>Dishwasher</option>
        <option>Assistant Manager</option>
        <option>Supervisor</option>
        <option>Manager</option>
        <option>Office Worker</option>
        <option>Reception</option>
        <option>Personal Assistant</option>
        <option>CEO</option>
        <option>Master Chef</option>
        <option>Waiter</option>
      </select>
    </div>

    <!-- Step 7 – Review & Submit -->
    <div class="step">
      <h3>Step 7: Review & Submit</h3>
      <div class="summary" id="summary"></div>
      <p>Please send your CV to <strong>hclrestaurantofficial@gmail.com</strong></p>
    </div>

    <div class="buttons">
      <button type="button" id="prevBtn" onclick="nextPrev(-1)">Previous</button>
      <button type="button" id="nextBtn" onclick="nextPrev(1)">Next</button>
    </div>

  </form>
</div>

<script>
let currentStep = 0;
showStep(currentStep);

function showStep(n) {
  const steps = document.getElementsByClassName("step");
  const dots = document.getElementsByClassName("dot");
  for(let i=0;i<steps.length;i++) steps[i].classList.remove("active");
  steps[n].classList.add("active");
  for(let i=0;i<dots.length;i++) dots[i].classList.remove("active");
  dots[n].classList.add("active");

  document.getElementById("prevBtn").style.display = n === 0 ? "none" : "inline";
  document.getElementById("nextBtn").innerHTML = n === (steps.length - 1) ? "Submit" : "Next";

  if(n === steps.length -1) displaySummary();
}

function nextPrev(n) {
  const steps = document.getElementsByClassName("step");

  // Age validation on Step 1
  if(currentStep === 0 && n === 1){
    const dob = document.getElementById("dob").value;
    if(dob){
      const birthDate = new Date(dob);
      const today = new Date();
      let age = today.getFullYear() - birthDate.getFullYear();
      const m = today.getMonth() - birthDate.getMonth();
      if(m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
      if(age < 18){
        alert("You must be at least 18 years old to apply.");
        return false;
      }
    }
  }

  steps[currentStep].classList.remove("active");
  currentStep += n;
  if(currentStep >= steps.length){
    document.getElementById("jobForm").submit();
    return false;
  }
  showStep(currentStep);
}

function displaySummary() {
  const form = document.getElementById("jobForm");
  const summary = document.getElementById("summary");
  let output = "<ul>";
  for(let i=0;i<form.elements.length;i++){
    const e = form.elements[i];
    if(e.name && e.type !== "button" && e.type !== "submit"){
      output += `<li><strong>${e.placeholder || e.name.replace("_"," ")}:</strong> ${e.value || "N/A"}</li>`;
    }
  }
  output += "</ul>";
  summary.innerHTML = output;
}
</script>

</body>
</html>
