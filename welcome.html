<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCl Restaurant - Welcome</title>
<style>
body{
    margin:0;
    font-family:'Georgia', serif;
    background:url('https://images.unsplash.com/photo-1601924582975-7e62b6e2d0b0') center/cover no-repeat;
    background-size:cover;
    color:white;
}
.overlay{
    background:rgba(0,0,0,0.6);
    height:100vh;
    width:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}
h1{
    font-size:60px;
    color:gold;
    margin-bottom:20px;
    text-shadow:2px 2px 8px #000;
}
p{
    font-size:22px;
    color:white;
    margin-bottom:30px;
    max-width:700px;
}
.button-menu{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    justify-content:center;
}
.button-menu a{
    padding:12px 25px;
    background:gold;
    color:black;
    font-weight:bold;
    text-decoration:none;
    border-radius:5px;
    transition:0.3s;
}
.button-menu a:hover{
    background:white;
    color:black;
}
@media(max-width:600px){
    h1{font-size:40px;}
    p{font-size:18px;}
    .button-menu a{padding:10px 20px;font-size:14px;}
}
</style>
</head>
<body>

<div class="overlay">
<h1>Welcome to HCl Restaurant</h1>
<p>Experience authentic Italian cuisine in the heart of Rome, Italy. Explore our menu, meet our staff, and discover the finest international flavors!</p>

<div class="button-menu">
<a href="home.html">Home</a>
<a href="about.html">About</a>
<a href="menu.html">Menu</a>
<a href="careers.html">Careers</a>
<a href="contact.html">Contact</a>
</div>
</div>

</body>
</html>
