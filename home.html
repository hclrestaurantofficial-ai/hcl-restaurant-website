<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HCL Italian Restaurant</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f5f5;
}

/* NAVBAR */

header{
display:flex;
justify-content:space-between;
align-items:center;
background:#111;
color:white;
padding:15px 40px;
}

.logo{
font-size:24px;
font-weight:bold;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
}

nav a:hover{
color:#ffb703;
}

.search input{
padding:6px;
border-radius:4px;
border:none;
}

/* HERO */

.hero{
height:70vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
background-size:cover;
background-position:center;
animation:slide 20s infinite;
}

.hero h1{
font-size:55px;
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:10px;
}

@keyframes slide{

0%{background-image:url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4");}

25%{background-image:url("https://images.unsplash.com/photo-1555992336-03a23c7b20ee");}

50%{background-image:url("https://images.unsplash.com/photo-1504674900247-0877df9cc836");}

75%{background-image:url("https://images.unsplash.com/photo-1414235077428-338989a2e8c0");}

100%{background-image:url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4");}

}

/* GALLERY */

.gallery{
padding:60px 10%;
text-align:center;
}

.gallery h2{
font-size:35px;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.grid img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
transition:0.3s;
}

.grid img:hover{
transform:scale(1.05);
}

/* REVIEWS */

.reviews{
background:#eee;
padding:60px 10%;
text-align:center;
}

.review{
background:white;
padding:20px;
margin:10px;
border-radius:10px;
display:inline-block;
width:250px;
}

/* ORDER FORM */

.contact{
padding:60px 10%;
text-align:center;
}

form{
max-width:500px;
margin:auto;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#e63946;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#c1121f;
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<header>

<div class="logo">HCL Restaurant</div>

<nav>
<a href="#">Home</a>
<a href="#">Menu</a>
<a href="#">About</a>
<a href="#">Careers</a>
<a href="#">Contact</a>
</nav>

<div class="search">
<input type="text" placeholder="Search food...">
</div>

</header>

<section class="hero">
<h1>Welcome to HCL Italian Restaurant</h1>
</section>

<section class="gallery">

<h2>Our Restaurant</h2>

<div class="grid">

<img src="https://source.unsplash.com/600x400/?restaurant,interior">
<img src="https://source.unsplash.com/600x400/?restaurant,building">
<img src="https://source.unsplash.com/600x400/?italian,restaurant">
<img src="https://source.unsplash.com/600x400/?chef,cooking">
<img src="https://source.unsplash.com/600x400/?pizza,restaurant">
<img src="https://source.unsplash.com/600x400/?restaurant,kitchen">
<img src="https://source.unsplash.com/600x400/?italian,food">
<img src="https://source.unsplash.com/600x400/?restaurant,outside">

</div>

</section>

<section class="reviews">

<h2>Customer Reviews</h2>

<div class="review">
<b>Ali</b>
<p>Amazing pizza and great service!</p>
</div>

<div class="review">
<b>Sara</b>
<p>Beautiful restaurant and delicious pasta.</p>
</div>

<div class="review">
<b>Usman</b>
<p>Best Italian food in town!</p>
</div>

</section>

<section class="contact">

<h2>Online Order</h2>

<form action="https://formspree.io/f/xykdozek" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Write your order..." required></textarea>

<button type="submit">Send Order</button>

</form>

</section>

<footer>

<p>© 2026 HCL Italian Restaurant</p>

</footer>

</body>
  </html>
