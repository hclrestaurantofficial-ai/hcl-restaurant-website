<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCl Restaurant - Careers</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
<style>
body{margin:0;font-family:Arial;color:white;background:black;}
nav{position:fixed;width:100%;top:0;background:black;display:flex;justify-content:space-between;padding:15px;z-index:100;}
nav h2{color:gold;}
nav ul{display:flex;list-style:none;}
nav ul li{margin-left:20px;}
nav ul li a{color:white;text-decoration:none;}
nav ul li a:hover{color:gold;}
.container{max-width:900px;margin:120px auto;padding:20px;background:rgba(0,0,0,0.8);border-radius:10px;}
h1,h3{text-align:center;margin-bottom:15px;color:gold;}
input,select,textarea{width:100%;padding:10px;margin:8px 0;border-radius:5px;border:none;}
button{padding:10px 20px;background:gold;border:none;cursor:pointer;margin-top:10px;}
.step{display:none;}
.step.active{display:block;}
.nav-buttons{display:flex;justify-content:space-between;}
.notice{background:#222;padding:10px;margin-top:10px;border-left:5px solid gold;}
</style>
</head>
<body>
<nav>
<h2>HCl Restaurant</h2>
<ul>
<li><a href="index.html">Welcome</a></li>
<li><a href="home.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="menu.html">Menu</a></li>
<li><a href="careers.html">Careers</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<div class="container">
<h1>Careers - Apply Now</h1>
<form action="https://formspree.io/f/xykdozek" method="POST">

<!-- STEP 1: Personal Info -->
<div class="step active">
<h3>Personal Information</h3>
<input type="text" name="Full Name" placeholder="Full Name" required>
<input type="text" name="Father Name" placeholder="Father Name">
<input type="date" name="Date of Birth">
<input type="text" name="CNIC">
<select name="Gender"><option>Male</option><option>Female</option><option>Other</option></select>
<select name="Marital Status"><option>Single</option><option>Married</option><option>Other</option></select>
<button type="button" onclick="nextStep()">Next</button>
</div>

<!-- STEP 2: Contact Info -->
<div class="step">
<h3>Contact Information</h3>
<input id="phone" type="tel" name="Phone" required>
<input type="email" name="Email" placeholder="Email Address" required>
<select name="Country" onchange="showOtherCountry(this)" required>
<option value="">🌍 Select Country</option>
<option>🇵🇭 Philippines</option>
<option>🇻🇳 Vietnam</option>
<option>🇹🇷 Turkey</option>
<option>🇮🇩 Indonesia</option>
<option>🇨🇳 China</option>
<option>🇦🇺 Australia</option>
<option>🇦🇹 Austria</option>
<option>🇹🇭 Thailand</option>
<option>🇵🇹 Portugal</option>
<option>Other</option>
</select>
<input type="text" id="otherCountry" name="Other Country" placeholder="Write Country Name" style="display:none;">
<div class="nav-buttons"><button type="button" onclick="prevStep()">Back</button><button type="button" onclick="nextStep()">Next</button></div>
</div>

<!-- STEP 3: Passport -->
<div class="step">
<h3>Passport Details</h3>
<select onchange="togglePassport(this)"><option value="No">No Passport</option><option value="Yes">Yes</option></select>
<div id="passportFields" style="display:none;">
<input type="text" name="Passport Number" placeholder="Passport Number">
<input type="date" name="Issue Date">
<input type="date" name="Expiry Date">
</div>
<div class="nav-buttons"><button type="button" onclick="prevStep()">Back</button><button type="button" onclick="nextStep()">Next</button></div>
</div>

<!-- STEP 4: Position & Education -->
<div class="step">
<h3>Position & Education</h3>
<select name="Position">
<option>Chef</option><option>Cleaner</option><option>Crew Member</option><option>Dish Washer</option>
<option>Assistant Manager</option><option>Supervisor</option><option>Office Worker</option><option>Waiter</option>
<option>Assistant CEO</option><option>Master Chef</option><option>Food Management Assistant</option>
<option>Shift Head</option><option>Morning Shift</option><option>Night Shift</option>
<option>All Positions</option>
</select>
<select name="Education">
<option>No Education</option><option>High School</option><option>Bachelor</option><option>Master</option>
<option>PhD</option><option>Other</option>
</select>
<input type="text" name="Institute Name" placeholder="Institute Name">
<input type="text" name="Passing Year" placeholder="Passing Year">
<input type="text" name="Grade" placeholder="Grade / Percentage">
<div class="nav-buttons"><button type="button" onclick="prevStep()">Back</button><button type="button" onclick="nextStep()">Next</button></div>
</div>

<!-- STEP 5: Work Experience -->
<div class="step">
<h3>Work Experience</h3>
<select onchange="toggleExperience(this)"><option value="No">No Experience</option><option value="Yes">Yes</option></select>
<div id="experienceFields" style="display:none;">
<input type="text" name="Company Name" placeholder="Company Name">
<input type="text" name="Job Role" placeholder="Job Role">
<input type="text" name="Duration" placeholder="Duration">
<input type="text" name="Reason for Leaving" placeholder="Reason for Leaving">
</div>
<div class="nav-buttons"><button type="button" onclick="prevStep()">Back</button><button type="button" onclick="nextStep()">Next</button></div>
</div>

<!-- STEP 6: Language & Declaration -->
<div class="step">
<h3>Language & Declaration</h3>
<select name="Language"><option>German</option><option>English</option><option>Other</option></select>
<div class="notice">Please send your CV & Picture to:<br><b>hclrestaurantofficial@gmail.com</b></div>
<label><input type="checkbox" required> I confirm that the information provided is correct.</label>
<input type="text" name="Signature" placeholder="Type Full Name as Signature" required>
<div class="nav-buttons"><button type="button" onclick="prevStep()">Back</button><button type="submit">Submit Application</button></div>
</div>

</form>
</div>

<script>
let currentStep=0;
const steps=document.querySelectorAll(".step");
function showStep(i){steps.forEach((s,index)=>{s.classList.remove("active");if(index===i)s.classList.add("active");});}
function nextStep(){if(currentStep<steps.length-1){currentStep++;showStep(currentStep);}}
function prevStep(){if(currentStep>0){currentStep--;showStep(currentStep);}}
function togglePassport(select){document.getElementById("passportFields").style.display=select.value==="Yes"?"block":"none";}
function toggleExperience(select){document.getElementById("experienceFields").style.display=select.value==="Yes"?"block":"none";}
function showOtherCountry(select){document.getElementById("otherCountry").style.display=select.value==="Other"?"block":"none";}
const phoneInput=document.querySelector("#phone");
window.intlTelInput(phoneInput,{initialCountry:"auto",geoIpLookup:function(callback){fetch("https://ipapi.co/json").then(r=>r.json()).then(d=>callback(d.country_code)).catch(()=>callback("US"));},utilsScript:"https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"});
</script>
</body>
  </html>
