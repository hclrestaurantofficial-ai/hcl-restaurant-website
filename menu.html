<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCL Restaurant Menu</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f4f4;}
header{display:flex;justify-content:space-between;align-items:center;background:#111;color:white;padding:15px 40px;position:sticky;top:0;z-index:100;}
.logo{font-size:24px;font-weight:bold;}
nav a{color:white;margin:0 15px;text-decoration:none;font-weight:bold;}
nav a:hover{color:orange;}
.search{margin:20px;text-align:center;}
.search input{padding:10px;width:300px;font-size:16px;border-radius:5px;border:1px solid #ccc;}
.filter-buttons{text-align:center;margin:20px;}
.filter-buttons button{margin:5px;padding:8px 15px;border:none;border-radius:5px;background:#e63946;color:white;cursor:pointer;}
.filter-buttons button:hover{background:#c1121f;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;padding:20px 8%;}
.card{background:white;border-radius:10px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.1);position:relative;}
.card img{width:100%;height:180px;object-fit:cover;}
.card h3{margin:10px;}
.price{color:#e63946;font-weight:bold;margin:0 10px 10px;}
button.add-cart{position:absolute;bottom:10px;right:10px;padding:6px 12px;background:#0077b6;color:white;border:none;border-radius:5px;cursor:pointer;}
button.add-cart:hover{background:#023e8a;}
footer{background:#111;color:white;text-align:center;padding:20px;margin-top:40px;}
</style>
</head>
<body>

<header>
<div class="logo">HCL Restaurant</div>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="menu.html">Menu</a>
<a href="careers.html">Careers</a>
<a href="contact.html">Contact</a>

<script>
function searchFood(){
let input=document.getElementById("searchInput").value.toLowerCase();
let cards=document.querySelectorAll(".card");
cards.forEach(card=>{
let title=card.querySelector("h3").innerText.toLowerCase();
card.style.display=title.includes(input)? "block":"none";
});
}

function filterCategory(category){
let cards=document.querySelectorAll(".card");
cards.forEach(card=>{
card.style.display=(category==="all" || card.getAttribute("data-category")===category)? "block":"none";
});
}
</script>
