<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCL Restaurant</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }

        /* Background */
        body {
            background: url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.7);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* Search */
        .search-box {
            display: flex;
            align-items: center;
        }

        .search-box input {
            padding: 5px 10px;
            border-radius: 5px 0 0 5px;
            border: none;
            outline: none;
        }

        .search-box button {
            padding: 5px 10px;
            border: none;
            border-radius: 0 5px 5px 0;
            background: #f04;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .search-box button:hover {
            background: #c03;
        }

        /* Hero Section */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: rgba(0,0,0,0.4);
            padding: 0 1rem;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.5rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 1rem;
            background: rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="menu.html">Menu</a>
            <a href="jobs.html">Jobs</a>
            <a href="contact.html">Contact</a>
            <a href="tracking.html">Tracking</a>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search page...">
            <button onclick="searchPage()">Go</button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Welcome to HCL Restaurant</h1>
        <p>Delicious food at your fingertips</p>
    </section>

    <footer>
        &copy; 2026 HCL Restaurant. All Rights Reserved.
    </footer>

    <script>
        function searchPage() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            if(input.includes('home')) window.location.href = 'index.html';
            else if(input.includes('about')) window.location.href = 'about.html';
            else if(input.includes('menu')) window.location.href = 'menu.html';
            else if(input.includes('jobs')) window.location.href = 'jobs.html';
            else if(input.includes('contact')) window.location.href = 'contact.html';
            else if(input.includes('tracking')) window.location.href = 'tracking.html';
            else alert('Page not found! Please type: Home, About, Menu, Jobs, Contact, or Tracking');
        }
    </script>

</body>
</html>
