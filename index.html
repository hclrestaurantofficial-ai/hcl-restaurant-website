<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HCL Restaurant</title>

<style>

body,html{
margin:0;
padding:0;
font-family:Arial;
height:100%;
color:white;
}

.hero{
height:100vh;
background-size:cover;
background-position:center;
animation:slide 20s infinite;
}

@keyframes slide{
0%{background-image:url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4");}
33%{background-image:url("https://images.unsplash.com/photo-1555992336-03a23c7b20ee");}
66%{background-image:url("https://images.unsplash.com/photo-1504674900247-0877df9cc836");}
100%{background-image:url("https://images.unsplash.com/photo-1414235077428-338989a2e8c0");}
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.7);
padding:15px 40px;
}

.logo{
font-size:24px;
font-weight:bold;
}

.menu a{
color:white;
text-decoration:none;
margin:0 15px;
font-size:18px;
}

.menu a:hover{
color:orange;
}

.search-box input{
padding:6px;
border:none;
border-radius:3px;
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.center h1{
font-size:60px;
}

.center p{
font-size:22px;
}

</style>
</head>

<body>

<div class="hero">

<div class="navbar">

<div class="logo">HCL Restaurant</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Menu</a>
<a href="#">About</a>
<a href="#">Careers</a>
<a href="#">Contact</a>
</div>

<div class="search-box">
<input type="text" placeholder="Search food...">
</div>

</div>

<div class="center">
<h1>Welcome to HCL Restaurant</h1>
<p>Delicious Food • Great Experience</p>
</div>

</div>

</body>
</html>
