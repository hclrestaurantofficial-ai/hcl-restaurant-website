<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Application Tracking - HCL Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #89f7fe, #66a6ff);
    color: #333;
}

/* Header */
header {
    background: #4a00e0;
    color: white;
    padding: 28px;
    text-align: center;
    box-shadow: 0 5px 12px rgba(0,0,0,0.25);
}
header h1 {
    margin: 0;
    font-size: 2.4rem;
}
header p {
    margin: 5px 0 0;
    font-size: 1.1rem;
}

/* Container */
.container {
    max-width: 620px;
    margin: 45px auto;
    background: white;
    padding: 38px;
    border-radius: 16px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.3);
    text-align: center;
}

/* Title */
h2 {
    color: #4a00e0;
    margin-bottom: 28px;
    font-size: 1.9rem;
}

/* Input */
input {
    width: 92%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-bottom: 20px;
    font-size: 1rem;
}

/* Button */
button {
    padding: 14px 32px;
    border: none;
    border-radius: 10px;
    background: #4a00e0;
    color: white;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    background: #2f006e;
}

/* Result Card */
.result {
    display: none;
    margin-top: 30px;
    background: linear-gradient(135deg, #fa709a, #fee140);
    color: #222;
    padding: 24px;
    border-radius: 14px;
    box-shadow: 0 5px 18px rgba(0,0,0,0.2);
    text-align: left;
    font-size: 1.1rem;
}
.result p {
    margin: 9px 0;
}

/* Footer */
footer {
    text-align: center;
    padding: 18px;
    background: #2f006e;
    color: white;
    margin-top: 45px;
}
</style>
</head>

<body>

<header>
    <h1>HCL Restaurant</h1>
    <p>Job Application Tracking</p>
</header>

<div class="container">
    <h2>Find Your Application Status</h2>

    <input type="email" id="email" placeholder="Enter your email address">

    <button onclick="trackApplication()">Check Status</button>

    <div class="result" id="resultCard">
        <p><strong>Name:</strong> <span id="name"></span></p>
        <p><strong>Email:</strong> <span id="showEmail"></span></p>
        <p><strong>Status:</strong> <span id="status"></span></p>
        <p><strong>Last Update:</strong> <span id="update"></span></p>
    </div>
</div>

<footer>
    &copy; 2026 HCL Restaurant
</footer>

<script>
function trackApplication() {
    let email = document.getElementById("email").value.trim();
    if (!email) {
        alert("Please enter your email");
        return;
    }

    fetch("https://script.google.com/macros/s/AKfycbx4OyDJpyMyNzJ8uvnPWO19RKVwduSTtkE_F3C3nzS9d2JqJVvqdOYby1kmoOogfeGp/exec?email=" + encodeURIComponent(email))
    .then(res => res.json())
    .then(data => {
        if (data.status === "Not Found") {
            alert("No application found with this email!");
            return;
        }
        document.getElementById("name").innerText = data.name;
        document.getElementById("showEmail").innerText = data.email;
        document.getElementById("status").innerText = data.status;
        document.getElementById("update").innerText = data.update;
        document.getElementById("resultCard").style.display = "block";
    })
    .catch(err => {
        console.error(err);
        alert("Error fetching data. Try again later!");
    });
}
</script>

</body>
</html>
