<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCl Restaurant Job Application</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@2/dist/email.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:white;}
header{text-align:center;padding:20px;font-size:24px;font-weight:bold;}
main{max-width:800px;margin:20px auto;background:white;color:black;padding:30px;border-radius:10px;}
.form-step{display:none;}
.form-step.active{display:block;}
input,select{width:100%;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #ccc;}
button{padding:10px 20px;background:#2c5364;color:white;border:none;border-radius:5px;cursor:pointer;}
button:hover{background:#1e3c52;}
</style>
</head>
<body>

<header>HCl Restaurant - Job Application</header>

<main>
<form id="multiStepForm">

<!-- STEP 1 -->
<div class="form-step active">
<h2>Step 1: Personal Info</h2>
<input type="text" name="full_name" placeholder="Full Name" required>
<input type="text" name="father_name" placeholder="Father Name" required>
<label>Date of Birth</label>
<input type="date" name="dob" required>
<button type="button" class="next">Next</button>
</div>

<!-- STEP 2 -->
<div class="form-step">
<h2>Step 2: Contact</h2>
<input type="email" name="email" placeholder="Email" required>
<input type="tel" name="phone" placeholder="+Country Code Phone" required>
<select name="nationality" required>
<option value="">Select Nationality</option>
<option>Philippines</option>
<option>Vietnam</option>
<option>Turkey</option>
<option>France</option>
<option>Indonesia</option>
<option>China</option>
<option>Pakistan</option>
<option>India</option>
<option>Italy</option>
<option>Taiwan</option>
<option>Other</option>
</select>
<button type="button" class="prev">Back</button>
<button type="button" class="next">Next</button>
</div>

<!-- STEP 3: Address -->
<div class="form-step">
<h2>Step 3: Address</h2>
<input type="text" name="address" placeholder="Home Address" required>
<input type="text" name="city" placeholder="City" required>
<input type="text" name="state" placeholder="State / Province" required>
<input type="text" name="postal_code" placeholder="Postal Code" required>
<button type="button" class="prev">Back</button>
<button type="button" class="next">Next</button>
</div>

<!-- STEP 4: Education -->
<div class="form-step">
<h2>Step 4: Education</h2>
<select name="qualification" required>
<option value="">Highest Qualification</option>
<option>High School</option>
<option>Bachelor</option>
<option>Master</option>
<option>PhD</option>
<option>Other</option>
<option>No Education</option>
</select>
<input type="text" name="institute" placeholder="Institute Name" required>
<input type="number" name="passing_year" placeholder="Passing Year" required>
<label>Upload Certificate (PDF ≤2MB)</label>
<input type="file" name="certificate" accept="application/pdf" required>
<button type="button" class="prev">Back</button>
<button type="button" class="next">Next</button>
</div>

<!-- STEP 5: Work Experience -->
<div class="form-step">
<h2>Step 5: Work Experience</h2>
<input type="text" name="company_name" placeholder="Company Name" required>
<input type="text" name="job_role" placeholder="Job Role" required>
<input type="text" name="experience" placeholder="Years/Months" required>
<input type="text" name="experience_location" placeholder="Location" required>
<button type="button" class="prev">Back</button>
<button type="button" class="next">Next</button>
</div>

<!-- STEP 6: Job Position -->
<div class="form-step">
<h2>Step 6: Job Position</h2>
<select name="job_position" required>
<option value="">Select Position</option>
<option>Chief Cleaner</option>
<option>Crew Member</option>
<option>Dish Washer</option>
<option>Assistant Manager</option>
<option>Supervisor</option>
<option>Office Worker</option>
<option>Kitchen Helper</option>
<option>Food Safety</option>
<option>Waiter</option>
<option>Master Chief</option>
<option>Food Management Assistant</option>
<option>Shift Head</option>
<option>CEO Assistant</option>
<option>Reception</option>
</select>
<button type="button" class="prev">Back</button>
<button type="button" class="next">Next</button>
</div>

<!-- STEP 7: Passport -->
<div class="form-step">
<h2>Step 7: Passport Details</h2>
<input type="text" name="passport_number" placeholder="Passport Number" required>
<label>Date of Issue</label>
<input type="date" name="passport_issue" required>
<label>Date of Expiry</label>
<input type="date" name="passport_expiry" required>
<label>Upload Passport Image (≤2MB)</label>
<input type="file" name="passport_file" accept="image/*" required>
<button type="button" class="prev">Back</button>
<button type="button" class="next">Next</button>
</div>

<!-- STEP 8: CV & Photo -->
<div class="form-step">
<h2>Step 8: CV & Photo</h2>
<label>Upload CV (PDF ≤2MB)</label>
<input type="file" name="cv" accept="application/pdf" required>
<label>Upload Your Photo (≤2MB)</label>
<input type="file" name="photo" accept="image/*" required>
<button type="button" class="prev">Back</button>
<button type="submit">Submit Application</button>
</div>

</form>
</main>

<script src="script.js"></script>
</body>
  </html>
